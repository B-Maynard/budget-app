<div class="dashboard-wrapper">
  <p-toast />

  <div class="dashboard-container">
    <p-card header="Manage Bills" styleClass="bills-card">
      <div class="action-buttons mb-4">
        <p-button (onClick)="openNew()" label="New Bill" icon="bx bx-plus" class="flex-1" styleClass="w-full" />
      </div>

      <div class="search-container mb-4">
        <span class="p-input-icon-left w-full">
          <i class="bx bx-search"></i>
          <input type="text" pInputText [(ngModel)]="searchTerm" placeholder="Search bills by name..." class="w-full" />
        </span>
      </div>

      <div class="bills-list">
        @for (bill of filteredBills; track bill.id || bill._id) {
          <div class="bill-item slide-in" style="justify-content: space-between; align-items: center; padding: 1rem; border-radius: 8px; background: rgba(255,255,255,0.05); margin-bottom: 0.5rem; display: flex;">
            <div class="bill-info">
              <h3 style="margin: 0; font-size: 1.1rem; font-weight: 500;">{{bill.name}}</h3>
              <p style="margin: 0; font-size: 0.9rem; color: #aaa;">{{bill.frequency | titlecase}} • {{bill.price | currency}}</p>
            </div>
            <div class="bill-actions">
              <p-button (onClick)="editBill(bill)" icon="bx bx-pencil" [rounded]="true" [text]="true" severity="info" />
              <p-button (onClick)="delete(bill.id || bill._id)" icon="bx bx-trash" [rounded]="true" [text]="true" severity="danger" />
            </div>
          </div>
        }
      </div>

    </p-card>
  </div>

  <p-dialog [(visible)]="billDialog" [header]="dialogTitle" [modal]="true" [style]="{width: '90vw', maxWidth: '500px'}">
    <div class="p-fluid grid gap-4 p-4" style="display: flex; flex-direction: column; gap: 1rem; padding-top: 1rem;">
      <div class="field" style="display: flex; flex-direction: column;">
        <label for="name" style="margin-bottom: 0.5rem;">Name</label>
        <input id="name" type="text" pInputText [(ngModel)]="billForm.name" />
      </div>
      <div class="field" style="display: flex; flex-direction: column;">
        <label for="price" style="margin-bottom: 0.5rem;">Price</label>
        <input id="price" type="number" pInputText [(ngModel)]="billForm.price" />
      </div>
      <div class="field" style="display: flex; flex-direction: column;">
        <label for="frequency" style="margin-bottom: 0.5rem;">Frequency</label>
        <select id="frequency" class="w-full p-2" style="background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 6px; padding: 0.75rem;" [(ngModel)]="billForm.frequency">
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
          <option value="yearly">Yearly</option>
          <option value="one-time">One Time</option>
        </select>
      </div>

      @if (billForm.frequency === 'monthly') {
        <div class="field" style="display: flex; flex-direction: column;">
          <label for="dueDay" style="margin-bottom: 0.5rem;">Due Day (1-31)</label>
          <input id="dueDay" type="number" pInputText [(ngModel)]="billForm.dueDay" min="1" max="31" />
        </div>
      }

      @if (billForm.frequency === 'weekly') {
        <div class="field" style="display: flex; flex-direction: column;">
          <label for="dueDayOfWeek" style="margin-bottom: 0.5rem;">Day of Week</label>
          <select id="dueDayOfWeek" class="w-full p-2" style="background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 6px; padding: 0.75rem;" [(ngModel)]="billForm.dueDayOfWeek">
            <option [value]="0">Sunday</option>
            <option [value]="1">Monday</option>
            <option [value]="2">Tuesday</option>
            <option [value]="3">Wednesday</option>
            <option [value]="4">Thursday</option>
            <option [value]="5">Friday</option>
            <option [value]="6">Saturday</option>
          </select>
        </div>
      }

      @if (billForm.frequency === 'yearly') {
        <div class="field" style="display: flex; gap: 1rem;">
          <div style="flex: 1; display: flex; flex-direction: column;">
            <label for="dueMonth" style="margin-bottom: 0.5rem;">Month</label>
            <select id="dueMonth" class="w-full p-2" style="background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 6px; padding: 0.75rem;" [(ngModel)]="billForm.dueMonth">
              <option [value]="1">January</option>
              <option [value]="2">February</option>
              <option [value]="3">March</option>
              <option [value]="4">April</option>
              <option [value]="5">May</option>
              <option [value]="6">June</option>
              <option [value]="7">July</option>
              <option [value]="8">August</option>
              <option [value]="9">September</option>
              <option [value]="10">October</option>
              <option [value]="11">November</option>
              <option [value]="12">December</option>
            </select>
          </div>
          <div style="flex: 1; display: flex; flex-direction: column;">
            <label for="dueDay" style="margin-bottom: 0.5rem;">Day (1-31)</label>
            <input id="dueDay" type="number" pInputText [(ngModel)]="billForm.dueDay" min="1" max="31" />
          </div>
        </div>
      }
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" icon="bx bx-x" (onClick)="hideDialog()" styleClass="p-button-text" />
      <p-button label="Save" icon="bx bx-check" (onClick)="saveBill()" severity="success" />
    </ng-template>
  </p-dialog>
</div>
